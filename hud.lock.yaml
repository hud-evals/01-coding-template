prompts:
- name: mario-claire:coding-task
  description: "[Setup] General coding task scenario.\n\n    Sets up a blank workspace,\
    \ presents the prompt, then grades using\n    deterministic bash checks (typically:\
    \ run tests from the original repo).\n\n    Args:\n        prompt: The task instruction\
    \ shown to the agent.\n        bash_checks: List of {\"name\": str, \"command\"\
    : str, \"weight\": float}\n                     dicts for deterministic shell-based\
    \ grading.\n        validate_mode: Used by validation (baseline_fail / golden_pass).\n\
    \    "
  arguments: &id003
  - name: prompt
    required: true
    description: null
    type: string
  - name: bash_checks
    required: false
    description: null
    default: null
    inputSchema: &id001
      anyOf:
      - items:
          additionalProperties: true
          type: object
        type: array
      - type: 'null'
  - name: validate_mode
    required: false
    description: null
    default: null
    inputSchema: &id002
      anyOf:
      - enum:
        - baseline_fail
        - golden_pass
        type: string
      - type: 'null'
  meta:
    code: "@env.scenario(\"coding-task\", required_env_vars=[\"HUD_API_KEY\"])\nasync\
      \ def coding_task(\n    prompt: str,\n    bash_checks: list[dict] | None = None,\n\
      \    validate_mode: ValidateMode | None = None,\n):\n    \"\"\"General coding\
      \ task scenario.\n\n    Sets up a blank workspace, presents the prompt, then\
      \ grades using\n    deterministic bash checks (typically: run tests from the\
      \ original repo).\n\n    Args:\n        prompt: The task instruction shown to\
      \ the agent.\n        bash_checks: List of {\"name\": str, \"command\": str,\
      \ \"weight\": float}\n                     dicts for deterministic shell-based\
      \ grading.\n        validate_mode: Used by validation (baseline_fail / golden_pass).\n\
      \    \"\"\"\n    from hud.native.graders import BashGrader, Grade\n    from\
      \ hud.tools.types import SubScore\n\n    os.makedirs(WORKSPACE_DIR, exist_ok=True)\n\
      \n    answer = yield make_prompt(prompt)\n\n    graders = []\n\n    if bash_checks:\n\
      \        for check in bash_checks:\n            graders.append(\n          \
      \      BashGrader.grade(\n                    name=check[\"name\"],\n      \
      \              weight=check.get(\"weight\", 1.0),\n                    command=check[\"\
      command\"],\n                )\n            )\n\n    if not graders:\n     \
      \   graders.append(SubScore(name=\"no_graders_defined\", value=0.0, weight=1.0))\n\
      \n    yield await Grade.gather(*graders)\n"
    arguments:
    - name: prompt
      required: true
      type: string
    - name: bash_checks
      required: false
      default: null
      inputSchema: *id001
    - name: validate_mode
      required: false
      default: null
      inputSchema: *id002
    required_env_vars:
    - HUD_API_KEY
    fastmcp:
      tags: []
